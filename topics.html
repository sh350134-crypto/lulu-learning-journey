<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lulu 自學旅程｜主題清單</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="container topbar-inner">
          <div class="brand small">
            <div class="brand-mark" aria-hidden="true">L</div>
            <div class="brand-text">
              <div class="brand-title">Lulu 自學旅程</div>
              <div class="brand-subtitle">Topics</div>
            </div>
          </div>

          <div class="topbar-actions">
            <button id="logoutBtn" class="btn btn-ghost" type="button">登出</button>
          </div>
        </div>
      </header>

      <main class="container page">
        <section class="hero">
          <h1 class="page-title">主題清單</h1>
          <p class="muted">
            這裡整理我做過與正在做的學習專案。第一個主題是 AlphaTracker AI。
          </p>
        </section>

        <section class="grid">
          <article class="topic-card" id="alphaCard">
            <div class="topic-card-header">
              <div>
                <h2 class="topic-title">AlphaTracker AI</h2>
                <div class="topic-subtitle">動能交易 AI 決策中台</div>
              </div>
              <div class="status-pill status-inprogress">進行中</div>
            </div>

            <div class="tags">
              <span class="tag">MCP</span>
              <span class="tag">Multi-Agent</span>
              <span class="tag">RAG</span>
              <span class="tag">台股</span>
            </div>

            <div class="progress">
              <div class="progress-meta">
                <span class="muted">章節進度</span>
                <span class="muted" id="alphaProgressText">—</span>
              </div>
              <div class="progress-bar" aria-hidden="true">
                <div class="progress-fill" id="alphaProgressFill" style="width: 0%"></div>
              </div>
            </div>

            <div class="topic-card-footer">
              <a class="btn btn-primary" href="./alphatracker/index.html">進入主題</a>
              <a class="btn btn-ghost" href="./alphatracker/index.html?ch=01">從 CH 01 開始</a>
            </div>
          </article>
        </section>
      </main>

      <footer class="footer">
        <div class="container footer-inner">
          <span class="muted">© Lulu Learning Journey</span>
        </div>
      </footer>
    </div>

    <script src="./assets/auth.js"></script>
    <script src="./alphatracker/chapters.js"></script>
    <script>
      Auth.requireLogin();

      document.getElementById("logoutBtn").addEventListener("click", () => {
        Auth.logout();
        window.location.replace("./index.html");
      });

      // 用 localStorage 記錄「已完成章節」：alphatracker:completed:CH01 = "1"
      function getAlphaProgress() {
        const chapters = (window.AlphaTrackerChapters && AlphaTrackerChapters.chapters) || [];
        const total = chapters.length || 0;
        let done = 0;
        for (const ch of chapters) {
          const key = `alphatracker:completed:${ch.id}`;
          if (localStorage.getItem(key) === "1") done += 1;
        }
        return { done, total };
      }

      const { done, total } = getAlphaProgress();
      const percent = total ? Math.round((done / total) * 100) : 0;
      document.getElementById("alphaProgressText").textContent = `${done}/${total}（${percent}%）`;
      document.getElementById("alphaProgressFill").style.width = `${percent}%`;
    </script>
  </body>
</html>
