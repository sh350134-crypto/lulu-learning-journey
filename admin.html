<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lulu 後台編輯器</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="container topbar-inner">
          <div class="brand small">
            <div class="brand-mark" aria-hidden="true">L</div>
            <div class="brand-text">
              <div class="brand-title">Lulu 後台編輯器</div>
              <div class="brand-subtitle">Admin</div>
            </div>
          </div>

          <div class="topbar-actions">
            <a class="btn btn-ghost" href="./topics.html">返回網站</a>
          </div>
        </div>
      </header>

      <main class="container page">
        <div class="admin-layout">
          <aside class="admin-panel">
            <h2>章節選擇</h2>
            <div class="admin-field">
              <label for="chapterSelect">章節</label>
              <select id="chapterSelect" aria-label="章節選擇"></select>
            </div>

            <div class="admin-actions">
              <button id="exportBtn" class="btn btn-primary" type="button">匯出 JSON</button>
              <button id="clearBtn" class="btn" type="button">清除本章覆蓋</button>
            </div>

            <p class="muted" style="margin-top: 12px">
              所有修改會自動儲存到 localStorage（key: <code>lulu_content_overrides</code>）。
            </p>
          </aside>

          <section class="admin-panel">
            <h2 id="editorTitle">編輯區</h2>
            <div id="modules" class="admin-modules"></div>
          </section>
        </div>
      </main>

      <footer class="footer">
        <div class="container footer-inner">
          <span class="muted">Admin · Lulu Learning Journey</span>
        </div>
      </footer>
    </div>

    <script src="./assets/auth.js"></script>
    <script src="./alphatracker/chapters.js"></script>
    <script>
      Auth.requireLogin();

      const STORAGE_KEY = "lulu_content_overrides";
      const chaptersAll = (window.AlphaTrackerChapters && AlphaTrackerChapters.chapters) || [];
      const chapters = chaptersAll.filter((c) => {
        const n = Number(String(c.id).replace("CH ", ""));
        return Number.isFinite(n) && n >= 1 && n <= 9;
      });

      const chapterSelectEl = document.getElementById("chapterSelect");
      const editorTitleEl = document.getElementById("editorTitle");
      const modulesEl = document.getElementById("modules");
      const exportBtn = document.getElementById("exportBtn");
      const clearBtn = document.getElementById("clearBtn");

      const saveBtn = document.createElement("button");
      saveBtn.type = "button";
      saveBtn.className = "btn btn-primary";
      saveBtn.textContent = "儲存目前章節";

      const exportAllBtn = document.createElement("button");
      exportAllBtn.type = "button";
      exportAllBtn.className = "btn";
      exportAllBtn.textContent = "匯出全部內容 JSON";

      const clearChapterBtn = document.createElement("button");
      clearChapterBtn.type = "button";
      clearChapterBtn.className = "btn";
      clearChapterBtn.textContent = "清除此章節覆蓋";

      const footerActions = document.createElement("div");
      footerActions.className = "admin-actions";
      footerActions.style.marginTop = "12px";
      footerActions.appendChild(saveBtn);
      footerActions.appendChild(exportAllBtn);
      footerActions.appendChild(clearChapterBtn);
      modulesEl.insertAdjacentElement("beforebegin", footerActions);

      const savedEl = document.createElement("span");
      savedEl.className = "muted";
      savedEl.style.marginLeft = "8px";
      savedEl.style.fontWeight = "900";
      savedEl.textContent = "";
      footerActions.appendChild(savedEl);

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function moduleKey(chId, moduleIdx) {
        const chNum = Number(String(chId).replace("CH ", ""));
        return `ch${pad2(chNum)}_m${pad2(moduleIdx + 1)}`;
      }

      function readOverrides() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return {};
          return parsed;
        } catch {
          return {};
        }
      }

      function writeOverrides(obj) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
          return { ok: true };
        } catch (e) {
          return { ok: false, message: String((e && e.message) || e || "") };
        }
      }

      function getBaseChapter(chId) {
        return chapters.find((c) => c.id === chId) || chapters[0];
      }

      function setModuleOverride(chId, moduleIdx, patch) {
        const key = moduleKey(chId, moduleIdx);
        const overrides = readOverrides();
        const current = overrides[key] && typeof overrides[key] === "object" ? overrides[key] : {};
        overrides[key] = { ...current, ...patch };
        const res = writeOverrides(overrides);
        if (!res.ok) {
          alert("圖片太大，請壓縮後再上傳");
        }
      }

      function clearChapterOverrides(chId) {
        const chNum = Number(String(chId).replace("CH ", ""));
        const prefix = `ch${pad2(chNum)}_`;
        const overrides = readOverrides();
        for (const k of Object.keys(overrides)) {
          if (k.startsWith(prefix)) delete overrides[k];
        }
        writeOverrides(overrides);
      }

      function toDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(new Error("file read error"));
          reader.readAsDataURL(file);
        });
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function renderChapterOptions(activeId) {
        chapterSelectEl.innerHTML = "";
        for (const ch of chapters) {
          const opt = document.createElement("option");
          opt.value = ch.id;
          opt.textContent = `${ch.id}｜${ch.title}`;
          if (ch.id === activeId) opt.selected = true;
          chapterSelectEl.appendChild(opt);
        }
      }

      function renderEditor(chId) {
        const base = getBaseChapter(chId);
        if (!base) return;

        editorTitleEl.textContent = `編輯區｜${base.id}｜${base.title}`;
        modulesEl.innerHTML = "";

        base.modules.forEach((m, idx) => {
          const ov = readOverrides();
          const modOv = ov[moduleKey(chId, idx)] || {};

          const card = document.createElement("div");
          card.className = "module";

          const header = document.createElement("div");
          header.className = "module-toggle";
          header.style.cursor = "default";

          const titleWrap = document.createElement("div");
          titleWrap.className = "module-title";

          const dot = document.createElement("span");
          dot.className = "dot";
          dot.setAttribute("aria-hidden", "true");

          const titleText = document.createElement("span");
          titleText.textContent = `模組 ${idx + 1}：${m.title}`;
          titleWrap.appendChild(dot);
          titleWrap.appendChild(titleText);

          const right = document.createElement("span");
          right.className = "muted";
          right.textContent = "即時儲存";

          header.appendChild(titleWrap);
          header.appendChild(right);

          const body = document.createElement("div");
          body.className = "module-body";
          body.style.display = "block";

          // Title override
          const titleField = document.createElement("div");
          titleField.className = "admin-field";
          const titleLabel = document.createElement("label");
          titleLabel.textContent = "模組標題";
          const titleInput = document.createElement("input");
          titleInput.value = modOv.title ?? m.title;
          titleInput.addEventListener("input", () => setModuleOverride(chId, idx, { title: titleInput.value }));
          titleField.appendChild(titleLabel);
          titleField.appendChild(titleInput);

          // Core concept
          const conceptField = document.createElement("div");
          conceptField.className = "admin-field";
          const conceptLabel = document.createElement("label");
          conceptLabel.textContent = "核心概念（支援換行）";
          const conceptTa = document.createElement("textarea");
          conceptTa.value = modOv.concept ?? (m.coreConcept || "");
          conceptTa.addEventListener("input", () => setModuleOverride(chId, idx, { concept: conceptTa.value }));
          conceptField.appendChild(conceptLabel);
          conceptField.appendChild(conceptTa);

          // Content
          const paraField = document.createElement("div");
          paraField.className = "admin-field";
          const paraLabel = document.createElement("label");
          paraLabel.textContent = "內容段落（支援換行）";
          const paraTa = document.createElement("textarea");
          const baseJoined = (m.paragraphs || []).join("\n");
          paraTa.value = modOv.content ?? baseJoined;
          paraTa.addEventListener("input", () => setModuleOverride(chId, idx, { content: paraTa.value }));
          paraField.appendChild(paraLabel);
          paraField.appendChild(paraTa);

          // Image upload
          const imgField = document.createElement("div");
          imgField.className = "admin-field";
          const imgLabel = document.createElement("label");
          imgLabel.textContent = "圖片區";

          const imgPreview = document.createElement("img");
          imgPreview.className = "module-image";
          imgPreview.style.maxWidth = "220px";
          imgPreview.style.display = modOv.image_base64 ? "block" : "none";
          if (modOv.image_base64) imgPreview.src = modOv.image_base64;

          const imgActions = document.createElement("div");
          imgActions.className = "admin-actions";

          const delImg = document.createElement("button");
          delImg.type = "button";
          delImg.className = "btn";
          delImg.textContent = "刪除圖片";
          delImg.addEventListener("click", () => {
            setModuleOverride(chId, idx, { image_base64: "" });
            renderEditor(chId);
          });

          const imgInput = document.createElement("input");
          imgInput.type = "file";
          imgInput.accept = "image/*";
          imgInput.addEventListener("change", async () => {
            const file = imgInput.files && imgInput.files[0];
            if (!file) return;
            const dataUrl = await toDataUrl(file);
            setModuleOverride(chId, idx, { image_base64: dataUrl });
            renderEditor(chId);
          });
          imgField.appendChild(imgLabel);
          imgField.appendChild(imgPreview);
          imgField.appendChild(imgInput);
          imgActions.appendChild(delImg);
          imgField.appendChild(imgActions);

          body.appendChild(titleField);
          body.appendChild(conceptField);
          body.appendChild(paraField);
          body.appendChild(imgField);

          card.appendChild(header);
          card.appendChild(body);
          modulesEl.appendChild(card);
        });
      }

      function getInitialChapterId() {
        const params = new URLSearchParams(window.location.search);
        const q = (params.get("ch") || "").trim().toUpperCase();
        if (q) {
          const normalized = q.startsWith("CH") ? q : `CH ${q}`;
          const hit = chapters.find((c) => c.id === normalized);
          if (hit) return hit.id;
        }
        return chapters[0] ? chapters[0].id : "CH 01";
      }

      chapterSelectEl.addEventListener("change", () => {
        const chId = chapterSelectEl.value;
        const params = new URLSearchParams(window.location.search);
        params.set("ch", chId.replace("CH ", ""));
        window.location.search = params.toString();
      });

      // Bottom buttons
      saveBtn.addEventListener("click", () => {
        savedEl.textContent = "已儲存 ✓";
        window.setTimeout(() => (savedEl.textContent = ""), 1400);
      });

      exportAllBtn.addEventListener("click", () => {
        const data = readOverrides();
        downloadJson("content_override.json", data);
      });

      clearChapterBtn.addEventListener("click", () => {
        const chId = chapterSelectEl.value;
        clearChapterOverrides(chId);
        renderEditor(chId);
        savedEl.textContent = "已清除 ✓";
        window.setTimeout(() => (savedEl.textContent = ""), 1400);
      });

      // Keep existing buttons in sidebar working too
      exportBtn.addEventListener("click", () => exportAllBtn.click());
      clearBtn.addEventListener("click", () => clearChapterBtn.click());

      const initial = getInitialChapterId();
      renderChapterOptions(initial);
      renderEditor(initial);
    </script>
  </body>
</html>
